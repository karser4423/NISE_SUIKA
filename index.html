<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NISE SUIKA 3D Cylinder Prototype</title>
  <style>
    :root {
      --ink: #203040;
      --panel: rgba(255, 255, 255, 0.9);
      --accent: #ff6f9e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100svh;
      color: var(--ink);
      font-family: "Segoe UI", "Yu Gothic UI", "Meiryo", sans-serif;
      background:
        linear-gradient(180deg, #8fe4ff 0%, #d8f7ff 44%, #ffe08a 45%, #ffc85a 100%);
      overflow: hidden;
      touch-action: none;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100svh;
      min-width: 320px;
      overflow: hidden;
    }

    .beach-scene {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sun {
      position: absolute;
      top: 5vh;
      right: 8vw;
      width: clamp(64px, 10vw, 130px);
      aspect-ratio: 1;
      border-radius: 50%;
      background: #ffe066;
      box-shadow: 0 0 34px rgba(255, 224, 102, 0.65);
    }

    .sea {
      position: absolute;
      top: 31vh;
      left: 0;
      width: 100%;
      height: 13vh;
      background:
        repeating-linear-gradient(175deg, transparent 0 38px, rgba(255, 255, 255, 0.42) 40px 44px),
        linear-gradient(180deg, #26c3e9, #119bd0);
    }

    .palm {
      position: absolute;
      right: 3vw;
      top: 24vh;
      width: clamp(120px, 18vw, 220px);
      height: clamp(150px, 24vw, 285px);
    }

    .palm::before {
      content: "";
      position: absolute;
      left: 47%;
      top: 23%;
      width: 16px;
      height: 78%;
      border-radius: 20px;
      background: linear-gradient(90deg, #81512d, #c68144, #6a3e22);
      transform: rotate(9deg);
      transform-origin: top;
    }

    .leaf {
      position: absolute;
      left: 48%;
      top: 20%;
      width: 55%;
      height: 18%;
      border-radius: 100% 0;
      background: #1eaa65;
      transform-origin: left center;
    }

    .leaf:nth-child(1) { transform: rotate(-78deg); }
    .leaf:nth-child(2) { transform: rotate(-38deg); background: #42c76e; }
    .leaf:nth-child(3) { transform: rotate(6deg); }
    .leaf:nth-child(4) { transform: rotate(45deg); background: #33b966; }
    .leaf:nth-child(5) { transform: rotate(92deg); }

    #game3d {
      position: absolute;
      z-index: 2;
      left: 0;
      right: 0;
      bottom: 0;
      display: block;
      width: 100%;
      height: 70%;
      cursor: crosshair;
    }

    .hud {
      position: absolute;
      z-index: 4;
      top: 14px;
      left: 50%;
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      width: calc(100% - 12px);
      transform: translateX(-50%);
      align-items: stretch;
    }

    .ticket,
    .score-box,
    .coin-box,
    .controls,
    .notice {
      border: 2px solid rgba(122, 67, 31, 0.25);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 6px 18px rgba(79, 47, 22, 0.16);
    }

    .score-box,
    .coin-box {
      display: grid;
      place-content: center;
      min-height: 42px;
      padding: 5px 6px;
      text-align: center;
    }

    .label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0;
      opacity: 0.7;
    }

    .value {
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
    }

    .ticket {
      min-height: 42px;
      padding: 6px 8px;
    }

    .ticket-title {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 10px;
      font-weight: 900;
    }

    .ticket-target,
    .next-target {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
    }

    .ticket-target span:last-child,
    .next-target span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .target-icon {
      display: inline-grid;
      width: 30px;
      height: 30px;
      place-items: center;
      flex: 0 0 auto;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    .controls {
      display: none;
    }

    .control-row {
      display: grid;
      grid-template-columns: 82px 1fr 46px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      font-weight: 800;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 2px;
    }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      color: white;
      background: #1f9bcf;
      font-weight: 900;
      cursor: pointer;
      box-shadow: inset 0 -3px 0 rgba(0, 0, 0, 0.15);
    }

    button:active {
      transform: translateY(1px);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.12);
    }

    .message {
      position: absolute;
      z-index: 7;
      left: 50%;
      top: clamp(270px, 32svh, 320px);
      min-width: 156px;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      background: rgba(32, 48, 64, 0.86);
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      opacity: 0;
      transform: translate(-50%, -8px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    .message.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .notice {
      position: absolute;
      z-index: 8;
      left: 50%;
      top: 50%;
      display: none;
      width: min(520px, calc(100vw - 28px));
      padding: 16px;
      transform: translate(-50%, -50%);
      font-weight: 800;
      line-height: 1.6;
    }

    .notice.show {
      display: block;
    }

    .screen {
      position: absolute;
      z-index: 9;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: linear-gradient(180deg, rgba(142, 228, 255, 0.82), rgba(255, 224, 138, 0.76));
    }

    .screen.show {
      display: flex;
    }

    .screen-panel {
      width: min(640px, calc(100vw - 28px));
      max-height: calc(100svh - 36px);
      overflow: auto;
      border: 2px solid rgba(122, 67, 31, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.93);
      box-shadow: 0 10px 28px rgba(79, 47, 22, 0.22);
      padding: 18px;
    }

    .screen-title {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.1;
    }

    .screen-text {
      margin: 0 0 14px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.6;
      opacity: 0.82;
    }

    .menu-actions,
    .mode-list {
      display: grid;
      gap: 10px;
    }

    .mode-button {
      min-height: 70px;
      padding: 10px 12px;
      text-align: left;
      background: linear-gradient(180deg, #2ec4b6, #1f9bcf);
    }

    .mode-name {
      display: block;
      font-size: 15px;
      line-height: 1.2;
    }

    .mode-desc {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      line-height: 1.45;
      opacity: 0.92;
    }

    .secondary-button {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.92);
      border: 2px solid rgba(122, 67, 31, 0.25);
      box-shadow: none;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }

    .result-item {
      border-radius: 8px;
      background: rgba(46, 196, 182, 0.14);
      padding: 10px;
      text-align: center;
      font-weight: 900;
    }

    .result-label {
      display: block;
      font-size: 10px;
      opacity: 0.7;
    }

    .result-value {
      display: block;
      margin-top: 3px;
      font-size: 20px;
    }

    .hud-group {
      display: grid;
      gap: 6px;
    }

    .numeric-panel {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .icon-panel {
      grid-template-columns: minmax(0, 1.25fr) minmax(0, 0.95fr);
    }

    .evolution-panel {
      grid-template-columns: 1fr;
    }

    .action-panel {
      grid-template-columns: minmax(0, 1fr) 76px;
    }

    .stat-pill {
      border: 2px solid rgba(122, 67, 31, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      padding: 4px 8px;
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      min-width: 0;
    }

    .stat-pill span {
      display: block;
      margin-top: 1px;
      font-size: 14px;
    }

    .quit-button {
      min-height: 100%;
      padding: 4px 6px;
      background: linear-gradient(180deg, #ff7aa7, #ef476f);
      font-size: 12px;
    }

    .next-drink,
    .evolution-board {
      border: 2px solid rgba(122, 67, 31, 0.2);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.84);
      padding: 5px 8px;
    }

    .next-drink {
      display: grid;
      gap: 3px;
      font-size: 11px;
      font-weight: 900;
    }

    .next-drink .label,
    .evolution-title {
      flex: 0 0 auto;
      font-size: 9px;
      font-weight: 900;
      opacity: 0.7;
    }

    .next-preview {
      display: inline-grid;
      width: 30px;
      height: 30px;
      place-items: center;
      flex: 0 0 auto;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    .next-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .evolution-board {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 7px;
      align-items: center;
    }

    .evolution-list {
      display: grid;
      grid-template-columns: repeat(10, minmax(0, 1fr));
      gap: 4px;
    }

    .evolution-item {
      display: grid;
      min-width: 0;
      min-height: 48px;
      align-content: end;
      justify-items: center;
      gap: 2px;
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
    }

    .evolution-icon {
      display: grid;
      width: var(--drink-icon-size, 24px);
      height: var(--drink-icon-size, 24px);
      place-items: center;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
    }

    @media (max-width: 720px) {
      .numeric-panel {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .controls {
        left: 14px;
        right: 14px;
        bottom: 14px;
        width: auto;
      }

      .control-row {
        grid-template-columns: 74px 1fr 42px;
      }

      .evolution-board {
        grid-template-columns: 1fr;
      }

      .evolution-title {
        text-align: center;
      }

      .stat-pill,
      .score-box,
      .coin-box {
        padding-inline: 4px;
      }
    }

  </style>
</head>
<body>
  <main class="app" aria-label="NISE SUIKA 3Dプロトタイプ">
    <div class="beach-scene" aria-hidden="true">
      <div class="sun"></div>
      <div class="sea"></div>
      <div class="palm">
        <span class="leaf"></span>
        <span class="leaf"></span>
        <span class="leaf"></span>
        <span class="leaf"></span>
        <span class="leaf"></span>
      </div>
    </div>

    <section class="hud" aria-label="ゲーム情報">
      <div class="hud-group action-panel" aria-label="操作">
        <div class="stat-pill">MODE<span id="modeStat">-</span></div>
        <button id="quitButton" class="quit-button" type="button">やめる</button>
      </div>
      <div class="hud-group numeric-panel" aria-label="数字情報">
        <div class="score-box">
          <div class="label">SCORE</div>
          <div id="score" class="value">0</div>
        </div>
        <div class="coin-box">
          <div class="label">COIN</div>
          <div id="coins" class="value">0</div>
        </div>
        <div class="stat-pill">SHOT<span id="shotStat">0</span></div>
        <div class="stat-pill">TIME<span id="timeStat">0.0</span></div>
      </div>
      <div class="hud-group evolution-panel" aria-label="進化情報">
        <div class="evolution-board" aria-label="オブジェクトの進化段階">
          <div class="evolution-title">EVOLUTION</div>
          <div id="evolutionList" class="evolution-list"></div>
        </div>
      </div>
      <div class="hud-group icon-panel" aria-label="アイコン情報">
        <div class="ticket">
          <div class="ticket-title">ORDER TICKET</div>
          <div class="ticket-target">
            <span id="targetIcon" class="target-icon">🍋</span>
            <span id="targetText">レモンソーダ</span>
          </div>
        </div>
        <div class="next-drink" aria-label="次に発生するドリンク">
          <span class="label">NEXT</span>
          <div class="next-target">
            <span id="nextPreview" class="next-preview">🍋</span>
            <span id="nextName" class="next-name">レモンソーダ</span>
          </div>
        </div>
      </div>
    </section>

    <canvas id="game3d"></canvas>

    <div id="message" class="message" role="status" aria-live="polite"></div>
    <div id="notice" class="notice" role="alert"></div>

    <section id="titleScreen" class="screen show" aria-label="タイトル画面">
      <div class="screen-panel">
        <h1 class="screen-title">NISE SUIKA</h1>
        <p class="screen-text">南国ドリンクを合体させて、豪華な一杯を作る3Dプロトタイプです。</p>
        <div class="menu-actions">
          <button id="startButton" type="button">スタート</button>
        </div>
      </div>
    </section>

    <section id="modeScreen" class="screen" aria-label="モード選択画面">
      <div class="screen-panel">
        <h2 class="screen-title">モード選択</h2>
        <p class="screen-text">テストしたい遊び方を選んでください。</p>
        <div id="modeList" class="mode-list"></div>
        <div class="menu-actions" style="margin-top: 10px;">
          <button id="modeBackButton" class="secondary-button" type="button">タイトルへ戻る</button>
        </div>
      </div>
    </section>

    <section id="resultScreen" class="screen" aria-label="結果画面">
      <div class="screen-panel">
        <h2 id="resultTitle" class="screen-title">RESULT</h2>
        <p id="resultText" class="screen-text"></p>
        <div class="result-grid">
          <div class="result-item"><span class="result-label">SCORE</span><span id="resultScore" class="result-value">0</span></div>
          <div class="result-item"><span class="result-label">SHOT</span><span id="resultShots" class="result-value">0</span></div>
          <div class="result-item"><span class="result-label">TIME</span><span id="resultTime" class="result-value">0.0</span></div>
          <div class="result-item"><span class="result-label">MODE</span><span id="resultMode" class="result-value">-</span></div>
        </div>
        <div class="menu-actions">
          <button id="retryButton" type="button">もう一度</button>
          <button id="resultModeButton" class="secondary-button" type="button">モード選択へ</button>
        </div>
      </div>
    </section>

    <aside class="controls" aria-label="調整パラメーター">
      <div class="control-row">
        <label for="gravity">重力</label>
        <input id="gravity" type="range" min="20" max="160" step="5" value="35">
        <output id="gravityValue">35</output>
      </div>
      <div class="control-row">
        <label for="friction">摩擦</label>
        <input id="friction" type="range" min="0.70" max="0.995" step="0.005" value="0.995">
        <output id="frictionValue">0.995</output>
      </div>
      <div class="control-row">
        <label for="launch">射出速度</label>
        <input id="launch" type="range" min="160" max="1000" step="10" value="1000">
        <output id="launchValue">1000</output>
      </div>
      <div class="button-row">
        <button id="resetButton" type="button">リセット</button>
        <button id="nextButton" type="button">次を変更</button>
      </div>
    </aside>
  </main>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";

    const app = document.querySelector(".app");
    const canvas = document.getElementById("game3d");
    const scoreEl = document.getElementById("score");
    const coinsEl = document.getElementById("coins");
    const targetIconEl = document.getElementById("targetIcon");
    const targetTextEl = document.getElementById("targetText");
    const nextPreviewEl = document.getElementById("nextPreview");
    const nextNameEl = document.getElementById("nextName");
    const evolutionListEl = document.getElementById("evolutionList");
    const messageEl = document.getElementById("message");
    const noticeEl = document.getElementById("notice");
    const resetButton = document.getElementById("resetButton");
    const nextButton = document.getElementById("nextButton");
    const titleScreen = document.getElementById("titleScreen");
    const modeScreen = document.getElementById("modeScreen");
    const resultScreen = document.getElementById("resultScreen");
    const startButton = document.getElementById("startButton");
    const modeBackButton = document.getElementById("modeBackButton");
    const retryButton = document.getElementById("retryButton");
    const resultModeButton = document.getElementById("resultModeButton");
    const modeListEl = document.getElementById("modeList");
    const modeStatEl = document.getElementById("modeStat");
    const shotStatEl = document.getElementById("shotStat");
    const timeStatEl = document.getElementById("timeStat");
    const quitButton = document.getElementById("quitButton");
    const resultTitleEl = document.getElementById("resultTitle");
    const resultTextEl = document.getElementById("resultText");
    const resultScoreEl = document.getElementById("resultScore");
    const resultShotsEl = document.getElementById("resultShots");
    const resultTimeEl = document.getElementById("resultTime");
    const resultModeEl = document.getElementById("resultMode");
    const gravityInput = document.getElementById("gravity");
    const frictionInput = document.getElementById("friction");
    const launchInput = document.getElementById("launch");
    const gravityValue = document.getElementById("gravityValue");
    const frictionValue = document.getElementById("frictionValue");
    const launchValue = document.getElementById("launchValue");

    const table = {
      nearZ: 2.4,
      farZ: -7.4,
      nearWidth: 5.2,
      farWidth: 4.8,
      launchProgress: 0.25
    };

    const drinks = [
      { name: "レモンソーダ", icon: "🍋", colors: [0xffe66d, 0xff9f1c], radius: 0.34, height: 0.42, score: 10 },
      { name: "ライムジュース", icon: "🥝", colors: [0xb8f35a, 0x2ec4b6], radius: 0.42, height: 0.58, score: 25 },
      { name: "ベリーソーダ", icon: "🍓", colors: [0xff7aa7, 0xef476f], radius: 0.50, height: 0.76, score: 60 },
      { name: "オレンジスカッシュ", icon: "🍊", colors: [0xffbe0b, 0xfb8500], radius: 0.58, height: 0.96, score: 130 },
      { name: "トロピカルジュース", icon: "🍹", colors: [0xff9f1c, 0xfb5607], radius: 0.66, height: 1.18, score: 280 },
      { name: "ブルーハワイ", icon: "🧊", colors: [0x3a86ff, 0x00bbf9], radius: 0.74, height: 1.42, score: 560 },
      { name: "ピーチフロート", icon: "🍑", colors: [0xffafcc, 0xff70a6], radius: 0.82, height: 1.68, score: 1100 },
      { name: "メロンパフェ", icon: "🍈", colors: [0xb8f35a, 0x5dd85d], radius: 0.90, height: 1.96, score: 2200 },
      { name: "スターサンデー", icon: "⭐", colors: [0xfff2a8, 0xc77dff], radius: 0.98, height: 2.26, score: 4400 },
      { name: "スペシャルパフェドリンク", icon: "🍨", colors: [0xc77dff, 0xffafcc], radius: 1.06, height: 2.58, score: 9000 }
    ];

    const modes = {
      endless: {
        name: "無限スコア",
        shortName: "SCORE",
        desc: "ステージが詰まるまで合体を続け、スコアを伸ばします。",
        goalText: "ハイスコアを狙う"
      },
      evolutionShots: {
        name: "効率進化チャレンジ",
        shortName: "SHOT",
        desc: "10段階目を作るまでの射出数の少なさを競います。",
        goalText: "10段階目を少ない射出で作る"
      },
      evolutionTime: {
        name: "進化タイムアタック",
        shortName: "TIME",
        desc: "10段階目を作るまでのタイムを競います。",
        goalText: "10段階目を素早く作る"
      },
      orderRush: {
        name: "オーダーラッシュ",
        shortName: "ORDER",
        desc: "60秒間で注文票のドリンクを作り、ボーナス込みのスコアを競います。",
        goalText: "60秒で注文をこなす",
        timeLimit: 60
      }
    };

    const state = {
      scene: "title",
      modeId: "endless",
      objects: [],
      nextLevel: 0,
      upcomingLevel: 0,
      targetLevel: 2,
      score: 0,
      coins: 0,
      shots: 0,
      elapsed: 0,
      gameEnded: false,
      launcherT: 0.5,
      isPointerDown: false,
      heldLevel: null,
      launchCooldown: 0,
      lastTime: performance.now(),
      previewMesh: null
    };

    const params = {
      gravity: 0.35,
      friction: 0.995,
      launchSpeed: 10
    };

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xdaf7ff, 11, 28);

    const camera = new THREE.PerspectiveCamera(48, 1, 0.1, 80);
    camera.position.set(0, 8.2, 11.8);
    camera.lookAt(0, 0.28, -1.7);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setClearColor(0x000000, 0);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const pointerPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const aimMarker = new THREE.Group();
    const launchIndicator = new THREE.Group();
    const worldOrigin = new THREE.Vector3();
    const worldTarget = new THREE.Vector3();
    const worldDirection = new THREE.Vector3();
    const tmpVec = new THREE.Vector3();

    setupScene();
    buildModeButtons();
    buildEvolutionList();
    prepareBoard();
    setScene("title");
    updateParams();
    resize();
    requestAnimationFrame(loop);

    function setupScene() {
      const ambient = new THREE.HemisphereLight(0xffffff, 0x7a431f, 2.2);
      scene.add(ambient);

      const sun = new THREE.DirectionalLight(0xffffff, 2.8);
      sun.position.set(-4, 9, 6);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      sun.shadow.camera.left = -8;
      sun.shadow.camera.right = 8;
      sun.shadow.camera.top = 8;
      sun.shadow.camera.bottom = -8;
      scene.add(sun);

      scene.add(createTable());
      scene.add(createBackWall());
      scene.add(createLauncher());
      scene.add(createLaunchIndicator());
    }

    function createTable() {
      const group = new THREE.Group();
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.Float32BufferAttribute([
        -table.farWidth / 2, 0, table.farZ,
        table.farWidth / 2, 0, table.farZ,
        table.nearWidth / 2, 0, table.nearZ,
        -table.nearWidth / 2, 0, table.nearZ
      ], 3));
      geometry.setIndex([0, 1, 2, 0, 2, 3]);
      geometry.computeVertexNormals();
      const material = new THREE.MeshStandardMaterial({
        color: 0xc57932,
        roughness: 0.55,
        metalness: 0.02,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.receiveShadow = true;
      group.add(mesh);

      const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffe19c, transparent: true, opacity: 0.5 });
      for (let i = 0; i <= 9; i += 1) {
        const t = i / 9;
        const nearX = THREE.MathUtils.lerp(-table.nearWidth / 2, table.nearWidth / 2, t);
        const farX = THREE.MathUtils.lerp(-table.farWidth / 2, table.farWidth / 2, t);
        const points = [new THREE.Vector3(nearX, 0.012, table.nearZ), new THREE.Vector3(farX, 0.012, table.farZ)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), lineMaterial));
      }
      const crossMaterial = new THREE.LineBasicMaterial({ color: 0xfff4cf, transparent: true, opacity: 0.32 });
      for (let i = 1; i <= 7; i += 1) {
        const progress = i / 8;
        const z = zAtProgress(Math.pow(progress, 1.35));
        const bounds = laneBoundsAtZ(z);
        const points = [new THREE.Vector3(bounds.left, 0.018, z), new THREE.Vector3(bounds.right, 0.018, z)];
        group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points), crossMaterial));
      }
      group.add(createFullLine());

      return group;
    }

    function createFullLine() {
      const z = stageFullLineZ();
      const bounds = laneBoundsAtZ(z);
      const width = bounds.right - bounds.left;
      const geometry = new THREE.BoxGeometry(width, 0.026, 0.075);
      const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
      const line = new THREE.Mesh(geometry, material);
      line.position.set((bounds.left + bounds.right) / 2, 0.045, z);
      line.name = "stageFullLine";
      return line;
    }

    function createBackWall() {
      const wallWidth = table.farWidth + 0.8;
      const geometry = new THREE.BoxGeometry(wallWidth, 1.0, 0.42);
      const material = new THREE.MeshStandardMaterial({ color: 0x633719, roughness: 0.65 });
      const wall = new THREE.Mesh(geometry, material);
      wall.position.set(0, 0.5, table.farZ - 0.28);
      wall.castShadow = true;
      wall.receiveShadow = true;
      return wall;
    }

    function createLauncher() {
      scene.add(aimMarker);
      return aimMarker;
    }

    function createLaunchIndicator() {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(1, 0.035, 10, 48),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.78 })
      );
      ring.name = "ring";
      ring.rotation.x = Math.PI / 2;
      launchIndicator.add(ring);

      return launchIndicator;
    }

    function randomNextLevel() {
      const roll = Math.random();
      if (roll > 0.88) return 2;
      if (roll > 0.58) return 1;
      return 0;
    }

    function buildModeButtons() {
      modeListEl.innerHTML = "";
      for (const [modeId, mode] of Object.entries(modes)) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "mode-button";
        button.dataset.modeId = modeId;
        button.innerHTML = `<span class="mode-name">${mode.name}</span><span class="mode-desc">${mode.desc}</span>`;
        button.addEventListener("click", () => startGame(modeId));
        modeListEl.appendChild(button);
      }
    }

    function buildEvolutionList() {
      evolutionListEl.innerHTML = "";
      drinks.forEach((drink, index) => {
        const item = document.createElement("div");
        const iconSize = evolutionIconSize(index);
        item.className = "evolution-item";
        item.title = `${index + 1}段階目: ${drink.name}`;
        item.innerHTML = `
          <span class="evolution-icon" style="--drink-icon-size: ${iconSize}px; background-image: url('${drinkIconDataUrl(index)}')"></span>
          <span>${index + 1}</span>
        `;
        evolutionListEl.appendChild(item);
      });
    }

    function setScene(sceneName) {
      state.scene = sceneName;
      titleScreen.classList.toggle("show", sceneName === "title");
      modeScreen.classList.toggle("show", sceneName === "mode");
      resultScreen.classList.toggle("show", sceneName === "result");
      updateHud();
      updateLauncher();
    }

    function prepareBoard() {
      for (const obj of state.objects) {
        scene.remove(obj.mesh);
      }
      state.objects = [];
      state.nextLevel = randomNextLevel();
      state.upcomingLevel = randomNextLevel();
      state.targetLevel = randomTargetLevel();
      state.score = 0;
      state.coins = 0;
      state.shots = 0;
      state.elapsed = 0;
      state.gameEnded = false;
      state.heldLevel = null;
      state.launchCooldown = 0;
      updateHud();
      updateLauncher();
    }

    function startGame(modeId = state.modeId) {
      state.modeId = modeId;
      prepareBoard();
      setScene("play");
      showMessage(`${modes[state.modeId].name} スタート`);
    }

    function resetGame() {
      startGame(state.modeId);
    }

    function updateHud() {
      scoreEl.textContent = String(state.score);
      coinsEl.textContent = String(state.coins);
      const next = drinks[state.upcomingLevel];
      setDrinkIcon(nextPreviewEl, state.upcomingLevel);
      nextNameEl.textContent = next.name;
      const target = drinks[state.targetLevel];
      setDrinkIcon(targetIconEl, state.targetLevel);
      const mode = modes[state.modeId];
      if (state.scene === "play" && (state.modeId === "evolutionShots" || state.modeId === "evolutionTime")) {
        setDrinkIcon(targetIconEl, drinks.length - 1);
        targetTextEl.textContent = drinks[drinks.length - 1].name;
      } else {
        targetTextEl.textContent = target.name;
      }
      modeStatEl.textContent = mode.name;
      shotStatEl.textContent = String(state.shots);
      timeStatEl.textContent = formatTime(currentElapsed());
      quitButton.style.visibility = state.scene === "play" ? "visible" : "hidden";
    }

    function setDrinkIcon(element, level) {
      element.textContent = "";
      element.style.backgroundImage = `url('${drinkIconDataUrl(level)}')`;
    }

    function evolutionIconSize(level) {
      const minRadius = drinks[0].radius;
      const maxRadius = drinks[drinks.length - 1].radius;
      const t = (drinks[level].radius - minRadius) / Math.max(0.001, maxRadius - minRadius);
      return Math.round(20 + t * 18);
    }

    function drinkIconDataUrl(level) {
      if (!drinkIconDataUrl.cache) drinkIconDataUrl.cache = new Map();
      if (!drinkIconDataUrl.cache.has(level)) {
        drinkIconDataUrl.cache.set(level, createDrinkIconDataUrl(level));
      }
      return drinkIconDataUrl.cache.get(level);
    }

    function createDrinkIconDataUrl(level) {
      const size = 96;
      const iconCanvas = document.createElement("canvas");
      iconCanvas.width = size;
      iconCanvas.height = size;
      const ctx = iconCanvas.getContext("2d");
      drawDrinkIcon(ctx, level, size);
      return iconCanvas.toDataURL("image/png");
    }

    function drawDrinkIcon(ctx, level, size) {
      const spec = drinks[level];
      const radiusT = (spec.radius - drinks[0].radius) / Math.max(0.001, drinks[drinks.length - 1].radius - drinks[0].radius);
      const cupWidth = size * (0.42 + radiusT * 0.22);
      const cupHeight = size * (0.46 + radiusT * 0.16);
      const cx = size / 2;
      const topY = size * (0.21 - radiusT * 0.04);
      const bottomY = topY + cupHeight;
      const topW = cupWidth;
      const bottomW = cupWidth * 0.74;

      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.shadowColor = "rgba(79, 47, 22, 0.25)";
      ctx.shadowBlur = size * 0.035;
      ctx.shadowOffsetY = size * 0.035;

      drawIconStraw(ctx, level, cx, topY, cupWidth, cupHeight, size);

      ctx.beginPath();
      ctx.ellipse(cx, topY, topW / 2, size * 0.09, 0, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
      ctx.fill();

      const glassGradient = ctx.createLinearGradient(cx - cupWidth / 2, topY, cx + cupWidth / 2, bottomY);
      glassGradient.addColorStop(0, "rgba(255, 255, 255, 0.78)");
      glassGradient.addColorStop(1, "rgba(255, 255, 255, 0.32)");
      ctx.beginPath();
      ctx.moveTo(cx - topW * 0.46, topY);
      ctx.lineTo(cx + topW * 0.46, topY);
      ctx.lineTo(cx + bottomW * 0.5, bottomY);
      ctx.lineTo(cx - bottomW * 0.5, bottomY);
      ctx.closePath();
      ctx.fillStyle = glassGradient;
      ctx.fill();

      const liquidTop = topY + cupHeight * 0.28;
      const liquidGradient = ctx.createLinearGradient(cx, liquidTop, cx, bottomY);
      liquidGradient.addColorStop(0, colorToCss(spec.colors[0]));
      liquidGradient.addColorStop(1, colorToCss(spec.colors[1]));
      ctx.beginPath();
      ctx.moveTo(cx - topW * 0.39, liquidTop);
      ctx.lineTo(cx + topW * 0.39, liquidTop);
      ctx.lineTo(cx + bottomW * 0.42, bottomY - size * 0.03);
      ctx.lineTo(cx - bottomW * 0.42, bottomY - size * 0.03);
      ctx.closePath();
      ctx.fillStyle = liquidGradient;
      ctx.fill();

      ctx.beginPath();
      ctx.ellipse(cx, liquidTop, topW * 0.39, size * 0.065, 0, 0, Math.PI * 2);
      ctx.fillStyle = colorToCss(spec.colors[0]);
      ctx.fill();

      drawIconDecorations(ctx, level, cx, topY, cupWidth, cupHeight, size);

      ctx.lineWidth = size * 0.045;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.86)";
      ctx.beginPath();
      ctx.ellipse(cx, topY, topW / 2, size * 0.09, 0, 0, Math.PI * 2);
      ctx.stroke();

      ctx.lineWidth = size * 0.026;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.52)";
      ctx.beginPath();
      ctx.moveTo(cx - topW * 0.46, topY);
      ctx.lineTo(cx - bottomW * 0.5, bottomY);
      ctx.moveTo(cx + topW * 0.46, topY);
      ctx.lineTo(cx + bottomW * 0.5, bottomY);
      ctx.stroke();
      ctx.restore();
    }

    function drawIconStraw(ctx, level, cx, topY, cupWidth, cupHeight, size) {
      if (level < 1) return;
      ctx.save();
      ctx.translate(cx + cupWidth * 0.22, topY + cupHeight * 0.05);
      ctx.rotate(-0.28);
      ctx.lineCap = "round";
      ctx.lineWidth = size * 0.055;
      ctx.strokeStyle = level % 2 === 0 ? "#ffffff" : "#ff6f9e";
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.17);
      ctx.lineTo(0, cupHeight * 0.58);
      ctx.stroke();
      ctx.lineWidth = size * 0.026;
      ctx.strokeStyle = "#2ec4b6";
      ctx.beginPath();
      ctx.moveTo(0, -size * 0.03);
      ctx.lineTo(0, size * 0.14);
      ctx.stroke();
      ctx.restore();
    }

    function drawIconDecorations(ctx, level, cx, topY, cupWidth, cupHeight, size) {
      if (level >= 2) {
        ctx.fillStyle = "rgba(216, 247, 255, 0.82)";
        for (let i = 0; i < Math.min(4, level); i += 1) {
          const x = cx - cupWidth * 0.2 + i * cupWidth * 0.13;
          const y = topY + cupHeight * (0.3 + (i % 2) * 0.08);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(0.25 + i * 0.24);
          ctx.fillRect(-size * 0.035, -size * 0.035, size * 0.07, size * 0.07);
          ctx.restore();
        }
      }

      if (level >= 3) {
        const fruitColors = [0xffe66d, 0xb8f35a, 0xff7aa7, 0xff9f1c, 0x5dd85d];
        ctx.strokeStyle = colorToCss(fruitColors[level % fruitColors.length]);
        ctx.lineWidth = size * 0.045;
        ctx.beginPath();
        ctx.arc(cx - cupWidth * 0.34, topY + size * 0.03, size * 0.1, Math.PI * 0.15, Math.PI * 1.55);
        ctx.stroke();
      }

      if (level >= 4) {
        ctx.fillStyle = "#34b56a";
        drawLeaf(ctx, cx + cupWidth * 0.12, topY - size * 0.03, size * 0.13, -0.5);
        drawLeaf(ctx, cx + cupWidth * 0.24, topY - size * 0.01, size * 0.12, 0.62);
      }

      if (level >= 6) {
        ctx.fillStyle = "#fff8e8";
        for (let i = 0; i < 5; i += 1) {
          const angle = (i / 5) * Math.PI * 2;
          ctx.beginPath();
          ctx.ellipse(cx + Math.cos(angle) * size * 0.055, topY - size * 0.025 + Math.sin(angle) * size * 0.026, size * 0.055, size * 0.036, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      if (level >= 8) {
        ctx.strokeStyle = "#7a431f";
        ctx.lineWidth = size * 0.018;
        ctx.beginPath();
        ctx.moveTo(cx - cupWidth * 0.12, topY - size * 0.02);
        ctx.lineTo(cx - cupWidth * 0.22, topY - size * 0.24);
        ctx.stroke();
        drawStar(ctx, cx - cupWidth * 0.25, topY - size * 0.27, size * 0.07);
      }
    }

    function drawLeaf(ctx, x, y, size, rotation) {
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rotation);
      ctx.beginPath();
      ctx.ellipse(0, 0, size, size * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawStar(ctx, x, y, radius) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = "#fff2a8";
      ctx.beginPath();
      for (let i = 0; i < 10; i += 1) {
        const angle = -Math.PI / 2 + i * Math.PI / 5;
        const r = i % 2 === 0 ? radius : radius * 0.48;
        const px = Math.cos(angle) * r;
        const py = Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function colorToCss(color) {
      return `#${color.toString(16).padStart(6, "0")}`;
    }

    function showMessage(text) {
      messageEl.textContent = text;
      messageEl.classList.add("show");
      window.clearTimeout(showMessage.timer);
      showMessage.timer = window.setTimeout(() => messageEl.classList.remove("show"), 1300);
    }

    function currentElapsed() {
      return state.elapsed;
    }

    function formatTime(value) {
      return value.toFixed(1);
    }

    function endGame(reason) {
      if (state.gameEnded) return;
      state.gameEnded = true;
      state.heldLevel = null;
      setScene("result");
      const mode = modes[state.modeId];
      resultTitleEl.textContent = reason === "clear" ? "CLEAR!" : "GAME OVER";
      if (reason === "quit") {
        resultTitleEl.textContent = "途中で投げ出しました";
      }
      resultTextEl.textContent = resultMessage(reason);
      resultScoreEl.textContent = String(state.score);
      resultShotsEl.textContent = String(state.shots);
      resultTimeEl.textContent = formatTime(state.elapsed);
      resultModeEl.textContent = mode.shortName;
      showMessage(resultTitleEl.textContent);
    }

    function resultMessage(reason) {
      if (reason === "quit") return "プレイをやめました。";
      if (state.modeId === "endless") {
        return reason === "full" ? "ステージがいっぱいになりました。" : "プレイ終了です。";
      }
      if (state.modeId === "evolutionShots") {
        return `${drinks[drinks.length - 1].name}完成。射出数 ${state.shots} 回です。`;
      }
      if (state.modeId === "evolutionTime") {
        return `${drinks[drinks.length - 1].name}完成。タイム ${formatTime(state.elapsed)} 秒です。`;
      }
      if (state.modeId === "orderRush") {
        return `60秒終了。スコア ${state.score} 点です。`;
      }
      return "結果を確認してください。";
    }

    function checkGameEndConditions() {
      if (state.scene !== "play" || state.gameEnded) return;
      if (state.modeId === "orderRush" && state.elapsed >= modes.orderRush.timeLimit) {
        endGame("timeup");
        return;
      }
      if (state.modeId === "endless" && isStageFull()) {
        endGame("full");
      }
    }

    function isStageFull() {
      if (state.objects.length >= 24) return true;
      const frontLimit = stageFullLineZ();
      let blockers = 0;
      for (const obj of state.objects) {
        const slow = Math.hypot(obj.vx, obj.vz) < 0.18;
        if (slow && obj.z > frontLimit) blockers += 1;
      }
      return blockers >= 3;
    }

    function stageFullLineZ() {
      return zAtProgress(0.18);
    }

    function launchDrink(level = state.nextLevel) {
      if (state.scene !== "play" || state.gameEnded || state.launchCooldown > 0) return;
      const spec = drinks[level];
      const spawn = launchSpawnPoint(spec.radius);
      const direction = stageForwardVectorAt(spawn.x, spawn.z);
      const mesh = createDrinkMesh(level);
      mesh.position.set(spawn.x, spec.height / 2, spawn.z);
      scene.add(mesh);
      removePreviewMesh();

      state.objects.push({
        mesh,
        x: spawn.x,
        z: spawn.z,
        vx: direction.x * params.launchSpeed,
        vz: direction.z * params.launchSpeed,
        level,
        radius: spec.radius,
        height: spec.height,
        merged: false
      });

      if (level === state.nextLevel) {
        state.nextLevel = state.upcomingLevel;
        state.upcomingLevel = randomNextLevel();
      }
      state.shots += 1;
      state.launchCooldown = 0.22;
      updateHud();
      updateLauncher();
    }

    function createDrinkMesh(level, options = {}) {
      const spec = drinks[level];
      const group = new THREE.Group();
      const opacity = options.opacity ?? 1;
      const transparent = opacity < 1;
      const glassOpacity = transparent ? opacity * 0.34 : 0.42;
      const liquidOpacity = transparent ? opacity * 0.82 : 0.96;

      const glass = new THREE.Mesh(
        new THREE.CylinderGeometry(spec.radius * 1.05, spec.radius * 0.86, spec.height, 40, 1, true),
        new THREE.MeshStandardMaterial({
          color: 0xffffff,
          roughness: 0.08,
          metalness: 0.02,
          transparent: true,
          opacity: glassOpacity,
          side: THREE.DoubleSide
        })
      );
      glass.castShadow = true;
      glass.receiveShadow = true;
      group.add(glass);

      const liquid = new THREE.Mesh(
        new THREE.CylinderGeometry(spec.radius * 0.88, spec.radius * 0.74, spec.height * 0.68, 36),
        new THREE.MeshStandardMaterial({
          color: spec.colors[1],
          roughness: 0.24,
          metalness: 0.02,
          transparent: true,
          opacity: liquidOpacity,
          emissive: spec.colors[1],
          emissiveIntensity: 0.04
        })
      );
      liquid.position.y = -spec.height * 0.08;
      liquid.castShadow = true;
      liquid.receiveShadow = true;
      group.add(liquid);

      const top = new THREE.Mesh(
        new THREE.CylinderGeometry(spec.radius * 0.88, spec.radius * 0.88, 0.045, 36),
        new THREE.MeshStandardMaterial({
          color: spec.colors[0],
          roughness: 0.18,
          metalness: 0.05,
          emissive: spec.colors[0],
          emissiveIntensity: 0.08,
          transparent: true,
          opacity: liquidOpacity
        })
      );
      top.position.y = spec.height * 0.27;
      top.castShadow = true;
      group.add(top);

      const rim = new THREE.Mesh(
        new THREE.TorusGeometry(spec.radius * 1.03, 0.035, 8, 40),
        new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.16, transparent: true, opacity: Math.min(0.9, opacity) })
      );
      rim.position.y = spec.height / 2 + 0.06;
      rim.rotation.x = Math.PI / 2;
      group.add(rim);

      addDrinkDecorations(group, level, spec, opacity);

      return group;
    }

    function addDrinkDecorations(group, level, spec, opacity) {
      if (level >= 1) addStraw(group, spec, level, opacity);
      if (level >= 2) addIceCubes(group, spec, Math.min(4, level), opacity);
      if (level >= 3) addFruitSlice(group, spec, level, opacity);
      if (level >= 4) addMintLeaves(group, spec, opacity);
      if (level >= 6) addWhippedCream(group, spec, opacity);
      if (level >= 8) addStarPick(group, spec, opacity);
    }

    function decorationMaterial(color, opacity, roughness = 0.35) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness,
        metalness: 0.02,
        transparent: opacity < 1,
        opacity
      });
    }

    function addStraw(group, spec, level, opacity) {
      const straw = new THREE.Mesh(
        new THREE.CylinderGeometry(0.035, 0.035, spec.height * 0.95, 12),
        decorationMaterial(level % 2 === 0 ? 0xffffff : 0xff6f9e, opacity, 0.42)
      );
      straw.position.set(spec.radius * 0.28, spec.height * 0.38, -spec.radius * 0.08);
      straw.rotation.z = -0.32;
      straw.castShadow = true;
      group.add(straw);

      const stripe = new THREE.Mesh(
        new THREE.CylinderGeometry(0.039, 0.039, spec.height * 0.22, 12),
        decorationMaterial(0x2ec4b6, opacity, 0.42)
      );
      stripe.position.copy(straw.position);
      stripe.position.y += spec.height * 0.12;
      stripe.rotation.copy(straw.rotation);
      group.add(stripe);
    }

    function addIceCubes(group, spec, count, opacity) {
      const material = decorationMaterial(0xd8f7ff, Math.min(0.72, opacity), 0.12);
      for (let i = 0; i < count; i += 1) {
        const cube = new THREE.Mesh(new THREE.BoxGeometry(spec.radius * 0.23, spec.radius * 0.16, spec.radius * 0.23), material);
        const angle = (i / count) * Math.PI * 2 + 0.25;
        cube.position.set(Math.cos(angle) * spec.radius * 0.35, spec.height * 0.31, Math.sin(angle) * spec.radius * 0.28);
        cube.rotation.set(0.4 + i * 0.2, angle, 0.25);
        cube.castShadow = true;
        group.add(cube);
      }
    }

    function addFruitSlice(group, spec, level, opacity) {
      const fruitColors = [0xffe66d, 0xb8f35a, 0xff7aa7, 0xff9f1c, 0x5dd85d];
      const color = fruitColors[level % fruitColors.length];
      const slice = new THREE.Mesh(
        new THREE.TorusGeometry(spec.radius * 0.28, spec.radius * 0.045, 8, 24, Math.PI * 1.35),
        decorationMaterial(color, opacity, 0.28)
      );
      slice.position.set(-spec.radius * 0.38, spec.height / 2 + 0.08, spec.radius * 0.42);
      slice.rotation.set(Math.PI * 0.62, 0.12, -0.35);
      slice.castShadow = true;
      group.add(slice);
    }

    function addMintLeaves(group, spec, opacity) {
      const material = decorationMaterial(0x34b56a, opacity, 0.5);
      for (let i = 0; i < 2; i += 1) {
        const leaf = new THREE.Mesh(new THREE.SphereGeometry(spec.radius * 0.14, 16, 8), material);
        leaf.position.set(spec.radius * (0.08 + i * 0.13), spec.height / 2 + 0.12, spec.radius * 0.28);
        leaf.scale.set(1.7, 0.28, 0.75);
        leaf.rotation.set(0.45, i ? 0.8 : -0.55, i ? -0.5 : 0.5);
        leaf.castShadow = true;
        group.add(leaf);
      }
    }

    function addWhippedCream(group, spec, opacity) {
      const material = decorationMaterial(0xfff8e8, opacity, 0.3);
      for (let i = 0; i < 5; i += 1) {
        const angle = (i / 5) * Math.PI * 2;
        const cream = new THREE.Mesh(new THREE.SphereGeometry(spec.radius * 0.18, 16, 10), material);
        cream.position.set(Math.cos(angle) * spec.radius * 0.2, spec.height / 2 + 0.13, Math.sin(angle) * spec.radius * 0.2);
        cream.scale.set(1, 0.55, 1);
        cream.castShadow = true;
        group.add(cream);
      }
      const topCream = new THREE.Mesh(new THREE.SphereGeometry(spec.radius * 0.2, 16, 10), material);
      topCream.position.set(0, spec.height / 2 + 0.29, 0);
      topCream.scale.set(1, 0.7, 1);
      topCream.castShadow = true;
      group.add(topCream);
    }

    function addStarPick(group, spec, opacity) {
      const pick = new THREE.Mesh(
        new THREE.CylinderGeometry(0.025, 0.025, spec.height * 0.55, 8),
        decorationMaterial(0x7a431f, opacity, 0.48)
      );
      pick.position.set(-spec.radius * 0.18, spec.height / 2 + 0.28, -spec.radius * 0.1);
      pick.rotation.z = 0.24;
      group.add(pick);

      const star = new THREE.Mesh(
        new THREE.ConeGeometry(spec.radius * 0.16, spec.radius * 0.18, 5),
        decorationMaterial(0xfff2a8, opacity, 0.22)
      );
      star.position.set(-spec.radius * 0.28, spec.height / 2 + 0.58, -spec.radius * 0.1);
      star.rotation.set(Math.PI / 2, 0, 0.25);
      star.castShadow = true;
      group.add(star);
    }

    function makeIconTexture(icon) {
      const size = 128;
      const iconCanvas = document.createElement("canvas");
      iconCanvas.width = size;
      iconCanvas.height = size;
      const iconCtx = iconCanvas.getContext("2d");
      iconCtx.clearRect(0, 0, size, size);
      iconCtx.font = "84px 'Segoe UI Emoji', sans-serif";
      iconCtx.textAlign = "center";
      iconCtx.textBaseline = "middle";
      iconCtx.fillText(icon, size / 2, size / 2 + 5);
      const texture = new THREE.CanvasTexture(iconCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function launchSpawnPoint(radius) {
      const z = zAtProgress(table.launchProgress);
      const bounds = laneBoundsAtZ(z);
      const x = THREE.MathUtils.clamp(laneXAtZ(state.launcherT, z), bounds.left + radius, bounds.right - radius);
      return { x, z };
    }

    function update(dt) {
      state.launchCooldown = Math.max(0, state.launchCooldown - dt);
      if (state.scene !== "play" || state.gameEnded) {
        updateLauncher();
        return;
      }
      state.elapsed += dt;
      const drag = Math.pow(params.friction, dt * 60);

      for (const obj of state.objects) {
        const direction = stageForwardVectorAt(obj.x, obj.z);
        obj.vx += direction.x * params.gravity * dt;
        obj.vz += direction.z * params.gravity * dt;
        obj.vx *= drag;
        obj.vz *= drag;
        obj.x += obj.vx * dt;
        obj.z += obj.vz * dt;
        collideWalls(obj);
        obj.mesh.position.set(obj.x, obj.height / 2, obj.z);
      }

      for (let i = 0; i < 3; i += 1) {
        solveObjectCollisions();
      }

      state.objects = state.objects.filter((obj) => !obj.merged);
      for (const obj of state.objects) {
        obj.mesh.position.set(obj.x, obj.height / 2, obj.z);
      }
      updateLauncher();
      updateHud();
      checkGameEndConditions();
    }

    function collideWalls(obj) {
      const bounds = laneBoundsAtZ(obj.z);
      if (obj.x - obj.radius < bounds.left) {
        obj.x = bounds.left + obj.radius;
        obj.vx = Math.abs(obj.vx) * 0.32;
      }
      if (obj.x + obj.radius > bounds.right) {
        obj.x = bounds.right - obj.radius;
        obj.vx = -Math.abs(obj.vx) * 0.32;
      }
      if (obj.z + obj.radius > table.nearZ + 0.28) {
        obj.z = table.nearZ + 0.28 - obj.radius;
        obj.vz = -Math.abs(obj.vz) * 0.16;
      }
      if (obj.z - obj.radius < table.farZ) {
        obj.z = table.farZ + obj.radius;
        obj.vz = Math.abs(obj.vz) * 0.12;
        obj.vx *= 0.82;
        if (Math.abs(obj.vz) < 0.12) obj.vz = 0;
      }
    }

    function solveObjectCollisions() {
      for (let i = 0; i < state.objects.length; i += 1) {
        const a = state.objects[i];
        if (a.merged) continue;
        for (let j = i + 1; j < state.objects.length; j += 1) {
          const b = state.objects[j];
          if (b.merged) continue;

          const dx = b.x - a.x;
          const dz = b.z - a.z;
          const distance = Math.hypot(dx, dz) || 0.001;
          const minDistance = a.radius + b.radius;
          if (distance >= minDistance) continue;

          if (a.level === b.level && a.level < drinks.length - 1) {
            mergeObjects(a, b);
            break;
          }

          const nx = dx / distance;
          const nz = dz / distance;
          const overlap = minDistance - distance;
          a.x -= nx * overlap * 0.5;
          a.z -= nz * overlap * 0.5;
          b.x += nx * overlap * 0.5;
          b.z += nz * overlap * 0.5;

          const relVx = b.vx - a.vx;
          const relVz = b.vz - a.vz;
          const impact = relVx * nx + relVz * nz;
          if (impact < 0) {
            const impulse = impact * -0.42;
            a.vx -= impulse * nx;
            a.vz -= impulse * nz;
            b.vx += impulse * nx;
            b.vz += impulse * nz;
          }

          collideWalls(a);
          collideWalls(b);
        }
      }
    }

    function mergeObjects(a, b) {
      const nextLevel = a.level + 1;
      if (nextLevel >= drinks.length) return;
      const spec = drinks[nextLevel];
      const x = (a.x + b.x) / 2;
      const z = (a.z + b.z) / 2;

      a.merged = true;
      b.merged = true;
      scene.remove(a.mesh);
      scene.remove(b.mesh);

      state.score += spec.score;
      if (nextLevel === drinks.length - 1) {
        state.coins += 10;
        showMessage(`${spec.name} 完成!`);
        if (nextLevel === state.targetLevel) {
          state.score += spec.score;
          state.targetLevel = randomTargetLevel();
        }
        updateHud();
        if (state.modeId === "evolutionShots" || state.modeId === "evolutionTime") {
          endGame("clear");
        }
        return;
      }

      const mesh = createDrinkMesh(nextLevel);
      mesh.position.set(x, spec.height / 2, z);
      scene.add(mesh);
      state.objects.push({
        mesh,
        x,
        z,
        vx: (a.vx + b.vx) * 0.18,
        vz: (a.vz + b.vz) * 0.18 - 0.32,
        level: nextLevel,
        radius: spec.radius,
        height: spec.height,
        merged: false
      });

      if (nextLevel === state.targetLevel) {
        state.coins += 1 + nextLevel;
        state.score += state.modeId === "orderRush" ? spec.score * 3 : spec.score;
        state.targetLevel = randomTargetLevel();
        showMessage(`${spec.name} 完成!`);
      } else {
        showMessage("MIX!");
      }
      updateHud();
    }

    function randomTargetLevel() {
      return 2 + Math.floor(Math.random() * Math.min(5, drinks.length - 3));
    }

    function updateLauncher() {
      const level = state.heldLevel ?? state.nextLevel;
      const spawn = launchSpawnPoint(drinks[level].radius);
      const direction = stageForwardVectorAt(spawn.x, spawn.z);
      aimMarker.position.set(spawn.x, 0.16, spawn.z + 0.72);
      aimMarker.rotation.y = Math.atan2(direction.x, -direction.z);
      updateLaunchIndicator(spawn, level);
      updatePreviewMesh(spawn, level);
    }

    function updateLaunchIndicator(spawn, level) {
      const spec = drinks[level];
      launchIndicator.visible = state.scene === "play";
      launchIndicator.position.set(spawn.x, 0.035, spawn.z);
      launchIndicator.rotation.y = Math.atan2(stageForwardVectorAt(spawn.x, spawn.z).x, -stageForwardVectorAt(spawn.x, spawn.z).z);
      for (const child of launchIndicator.children) {
        child.scale.setScalar(spec.radius * 1.18);
      }
    }

    function updatePreviewMesh(spawn, level) {
      if (state.scene !== "play") {
        removePreviewMesh();
        return;
      }
      const spec = drinks[level];
      if (!state.previewMesh || state.previewMesh.userData.level !== level) {
        removePreviewMesh();
        state.previewMesh = createDrinkMesh(level, { opacity: 0.64 });
        state.previewMesh.userData.level = level;
        scene.add(state.previewMesh);
      }
      state.previewMesh.position.set(spawn.x, spec.height / 2, spawn.z);
      state.previewMesh.rotation.y = aimMarker.rotation.y;
    }

    function removePreviewMesh() {
      if (!state.previewMesh) return;
      scene.remove(state.previewMesh);
      state.previewMesh = null;
    }

    function stageForwardVectorAt(x, z) {
      const t = lanePositionAtZ(x, z);
      const fromProgress = progressAtZ(z);
      const toProgress = THREE.MathUtils.clamp(fromProgress + 0.18, 0, 1);
      const fromX = laneXAtProgress(t, fromProgress);
      const toX = laneXAtProgress(t, toProgress);
      const toZ = zAtProgress(toProgress);
      const dx = toX - fromX;
      const dz = toZ - z;
      const length = Math.hypot(dx, dz) || 1;
      return {
        x: dx / length,
        z: dz / length
      };
    }

    function lanePositionAtZ(x, z) {
      const bounds = laneBoundsAtZ(z);
      const width = Math.max(0.001, bounds.right - bounds.left);
      return THREE.MathUtils.clamp((x - bounds.left) / width, 0, 1);
    }

    function laneXAtZ(t, z) {
      return laneXAtProgress(t, progressAtZ(z));
    }

    function laneXAtProgress(t, progress) {
      const left = THREE.MathUtils.lerp(-table.nearWidth / 2, -table.farWidth / 2, progress);
      const right = THREE.MathUtils.lerp(table.nearWidth / 2, table.farWidth / 2, progress);
      return THREE.MathUtils.lerp(left, right, t);
    }

    function laneBoundsAtZ(z) {
      const progress = progressAtZ(z);
      const halfWidth = THREE.MathUtils.lerp(table.nearWidth / 2, table.farWidth / 2, progress);
      return { left: -halfWidth, right: halfWidth };
    }

    function progressAtZ(z) {
      return THREE.MathUtils.clamp((table.nearZ - z) / Math.max(0.001, table.nearZ - table.farZ), 0, 1);
    }

    function zAtProgress(progress) {
      return THREE.MathUtils.lerp(table.nearZ, table.farZ, progress);
    }

    function updateParams() {
      gravityInput.value = "35";
      frictionInput.value = "0.995";
      launchInput.value = "1000";
      gravityValue.textContent = "35";
      frictionValue.textContent = "0.995";
      launchValue.textContent = "1000";
    }

    function setLauncherFromClientX(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      pointer.x = (localX / rect.width) * 2 - 1;
      pointer.y = -(localY / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      if (raycaster.ray.intersectPlane(pointerPlane, tmpVec)) {
        state.launcherT = lanePositionAtZ(tmpVec.x, table.nearZ);
      } else {
        state.launcherT = THREE.MathUtils.clamp(localX / rect.width, 0, 1);
      }
      updateLauncher();
    }

    function resize() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      camera.aspect = width / height;
      frameCameraForViewport(width, height);
      renderer.setSize(width, height, false);
      updateLauncher();
    }

    function frameCameraForViewport(width, height) {
      const aspect = width / Math.max(1, height);
      const tallRatio = THREE.MathUtils.clamp((0.9 - aspect) / 0.25, 0, 1);
      camera.fov = THREE.MathUtils.lerp(48, 32, tallRatio);
      camera.position.set(
        0,
        THREE.MathUtils.lerp(8.2, 8.4, tallRatio),
        THREE.MathUtils.lerp(11.8, 8.4, tallRatio)
      );
      camera.lookAt(
        0,
        THREE.MathUtils.lerp(0.28, 0.02, tallRatio),
        THREE.MathUtils.lerp(-1.7, -0.7, tallRatio)
      );
      camera.updateProjectionMatrix();
      camera.projectionMatrix.elements[9] = 0.22 * tallRatio;
      camera.updateMatrixWorld();
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - state.lastTime) / 1000);
      state.lastTime = now;
      update(dt);
      renderer.render(scene, camera);
      requestAnimationFrame(loop);
    }

    function showLoadError(error) {
      noticeEl.textContent = `3Dライブラリの読み込みに失敗しました。ネットワーク接続を確認してください。${error?.message ? ` (${error.message})` : ""}`;
      noticeEl.classList.add("show");
    }

    window.addEventListener("error", (event) => {
      if (String(event.message).includes("three")) {
        showLoadError(event.error);
      }
    });

    window.addEventListener("resize", resize);
    canvas.addEventListener("pointerdown", (event) => {
      if (state.scene !== "play" || state.gameEnded || state.launchCooldown > 0) return;
      if (canvas.setPointerCapture) {
        canvas.setPointerCapture(event.pointerId);
      }
      state.isPointerDown = true;
      state.heldLevel = state.nextLevel;
      setLauncherFromClientX(event.clientX, event.clientY);
    });
    canvas.addEventListener("pointermove", (event) => {
      if (!state.isPointerDown) return;
      setLauncherFromClientX(event.clientX, event.clientY);
    });
    canvas.addEventListener("pointerup", (event) => {
      if (state.isPointerDown) {
        setLauncherFromClientX(event.clientX, event.clientY);
        if (state.heldLevel !== null) {
          launchDrink(state.heldLevel);
        }
      }
      state.heldLevel = null;
      state.isPointerDown = false;
      updateLauncher();
    });
    canvas.addEventListener("pointercancel", () => {
      state.heldLevel = null;
      state.isPointerDown = false;
      updateLauncher();
    });

    resetButton.addEventListener("click", resetGame);
    nextButton.addEventListener("click", () => {
      if (state.scene !== "play") return;
      state.nextLevel = randomNextLevel();
      state.upcomingLevel = randomNextLevel();
      updateLauncher();
      updateHud();
    });

    startButton.addEventListener("click", () => setScene("mode"));
    modeBackButton.addEventListener("click", () => setScene("title"));
    retryButton.addEventListener("click", () => startGame(state.modeId));
    resultModeButton.addEventListener("click", () => setScene("mode"));
    quitButton.addEventListener("click", () => {
      if (state.scene === "play") {
        endGame("quit");
      }
    });

    window.addEventListener("keydown", (event) => {
      if (state.scene === "title" && (event.code === "Space" || event.key === "Enter")) {
        event.preventDefault();
        setScene("mode");
        return;
      }
      if (state.scene !== "play") return;
      if (event.key === "ArrowLeft") {
        state.launcherT = THREE.MathUtils.clamp(state.launcherT - 0.035, 0, 1);
        updateLauncher();
      } else if (event.key === "ArrowRight") {
        state.launcherT = THREE.MathUtils.clamp(state.launcherT + 0.035, 0, 1);
        updateLauncher();
      } else if (event.code === "Space") {
        event.preventDefault();
        launchDrink();
      }
    });
  </script>
</body>
</html>
